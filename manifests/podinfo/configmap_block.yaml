apiVersion: v1
kind: ConfigMap
metadata:
  name: block-400
data:
  block_400.html: |
    <!DOCTYPE html>
    <html lang="en">

    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Blocked request</title>
      <style>
        :root {
          --bg: #365f8b;
          --text: #f3f6fb;
          --muted: rgba(255, 255, 255, 0.82);
          --muted-2: rgba(255, 255, 255, 0.68);
          --accent: #e64431;
          --accent-shadow: #b22f25;
          --orb: #e81d1d;
          --orb-light: #e86d6d;
          --line: rgba(28, 58, 93, 0.55);
          --mascot-main: #9a79b4;
          --mascot-dark: #6d3e92;
          --mascot-stroke: #74458f;
        }

        * {
          box-sizing: border-box;
        }

        html,
        body {
          height: 100%%;
          margin: 0;
          font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
          background: var(--bg);
          color: var(--text);
        }

        body {
          display: grid;
          place-items: center;
          overflow: hidden;
        }

        .page {
          width: 100%%;
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 32px;
          position: relative;
          background:
            radial-gradient(circle at 50%% 36%%, rgba(255, 255, 255, 0.04), transparent 26%%),
            linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(0, 0, 0, 0.03));
        }

        .card {
          width: min(720px, 100%%);
          display: flex;
          flex-direction: column;
          align-items: center;
          text-align: center;
          gap: 10px;
          transform: translateY(-20px);
        }

        .mascot {
          width: 220px;
          max-width: 42vw;
          margin-bottom: 8px;
          filter: drop-shadow(0 10px 0 rgba(86, 38, 122, 0.16));
          animation: float 4.5s ease-in-out infinite;
        }

        @keyframes float {

          0%%,
          100%% {
            transform: translateY(0px);
          }

          50%% {
            transform: translateY(-8px);
          }
        }

        h1 {
          margin: 0;
          font-size: clamp(2rem, 2.5vw, 3rem);
          font-weight: 300;
          letter-spacing: 0.01em;
          line-height: 1.15;
        }

        .version {
          font-weight: 500;
          border-bottom: 2px solid rgba(255, 255, 255, 0.6);
          padding-bottom: 1px;
        }

        .sub {
          margin: 0;
          font-size: 1.05rem;
          color: var(--muted);
          font-weight: 500;
        }

        .sub strong {
          color: #ffffff;
          font-weight: 700;
        }

        .message {
          margin: 14px 0 4px;
          color: var(--muted-2);
          max-width: 44ch;
          font-size: 1rem;
          line-height: 1.5;
        }

        .actions {
          margin-top: 10px;
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 18px;
        }

        .badge {
          position: absolute;
          top: -6px;
          left: 8px;
          width: 17px;
          height: 17px;
          border-radius: 999px;
          background: #ff584a;
          display: grid;
          place-items: center;
          font-size: 0.7rem;
          font-weight: 700;
          line-height: 1;
        }

        .status {
          position: relative;
          display: flex;
          flex-direction: column;
          gap: 18px;
          margin-top: 4px;
          padding: 2px 0;
        }

        .status::before {
          content: "";
          position: absolute;
          top: 16px;
          bottom: 16px;
          left: 18px;
          width: 2px;
          background: var(--line);
          z-index: 0;
        }

        .status-item {
          position: relative;
          z-index: 1;
          display: flex;
          align-items: center;
          gap: 16px;
          color: rgba(255, 255, 255, 0.92);
          font-size: 1.05rem;
          font-weight: 700;
        }

        .dot {
          width: 38px;
          height: 38px;
          border-radius: 50%%;
          border: 4px solid rgba(255, 255, 255, 0.92);
          box-shadow: inset 0 0 0 999px transparent;
          background: transparent;
        }

        .dot.primary {
          background: var(--orb);
        }

        .dot.secondary {
          background: var(--orb-light);
        }

        .footer-note {
          margin-top: 8px;
          font-size: 0.92rem;
          color: rgba(255, 255, 255, 0.56);
        }

        @media (max-width: 640px) {
          .card {
            transform: none;
          }

          .mascot {
            width: 180px;
          }

          h1 {
            font-size: 2rem;
          }

          .sub,
          .message,
          .status-item {
            font-size: 0.95rem;
          }
        }
      </style>
    </head>

    <body>
      <main class="page">
        <section class="card" role="alert" aria-live="polite">
          <div class="media" aria-label="Blocking image">
            <img alt="Blocked" src="data:image/png;base64," />
          </div>

          <h1>Your request was blocked by Airbert</h1>
          <span class="note">This request was stopped before it reached the application.</span>

          <div class="rid">Request ID: %STREAM_ID%</div>

          <p class="sub">Served by <strong>Airbert</strong></p>

          <div class="actions">
            <div class="status" aria-label="status indicators">
              <div class="status-item">
                <span class="dot primary" aria-hidden="true"></span>
                <span>Request blocked</span>
              </div>
              <div class="status-item">
                <span class="dot secondary" aria-hidden="true"></span>
                <span>Please contact your administrator</span>
              </div>
            </div>
          </div>

        </section>
      </main>
    </body>

    </html>
