controller:
  type: deployment
  replicas: 1

alloy:
  extraPorts:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP

  configMap:
    create: true
    content: |
      // -------------------------------------------------------------------
      // Kubernetes pod logs for Airlock -> Loki
      // -------------------------------------------------------------------
      discovery.kubernetes "pod" {
        role = "pod"
      }

      discovery.relabel "airlock" {
        targets = discovery.kubernetes.pod.targets

        // Useful labels
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
          action        = "replace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
          action        = "replace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
          action        = "replace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          target_label  = "app"
          action        = "replace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_microgateway_airlock_com_engineVersion"]
          target_label  = "engine_version"
          action        = "replace"
        }

        // Static service label to simplify queries
        rule {
          target_label = "service"
          replacement  = "airlock-microgateway"
          action       = "replace"
        }
      }

      loki.source.kubernetes "airlock" {
        targets    = discovery.relabel.airlock.output
        forward_to = [loki.process.airlock.receiver]
      }

      loki.process "airlock" {
        stage.static_labels {
          values = { cluster = "my-cluster" }
        }
        forward_to = [loki.write.default.receiver]
      }

      // -------------------------------------------------------------------
      // OTLP receiver for applications
      // traces -> Tempo
      // logs   -> Loki
      // metrics are intentionally not forwarded
      // -------------------------------------------------------------------
      otelcol.receiver.otlp "apps" {
        grpc {
          endpoint = "0.0.0.0:4317"
        }

        http {
          endpoint = "0.0.0.0:4318"
        }

        output {
          traces = [otelcol.processor.batch.traces.input]
          logs   = [otelcol.processor.filter.drop_podinfo_debug.input]
        }
      }

      // Drop only debug/trace OTLP logs from podinfo before sending to Loki
      otelcol.processor.filter "drop_podinfo_debug" {
        error_mode = "ignore"

        logs {
          log_record = [
            "resource.attributes[\"service.name\"] == \"podinfo\" and severity_number < SEVERITY_NUMBER_INFO",
          ]
        }

        output {
          logs = [otelcol.exporter.loki.otlp.input]
        }
      }

      otelcol.processor.batch "traces" {
        output {
          traces = [otelcol.exporter.otlp.tempo.input]
        }
      }

      otelcol.exporter.otlp "tempo" {
        client {
          endpoint = "tempo.monitoring.svc.cluster.local:4317"
          tls {
            insecure             = true
            insecure_skip_verify = true
          }
        }
      }

      otelcol.exporter.loki "otlp" {
        forward_to = [loki.write.default.receiver]
      }

      // Shared Loki writer for both scraped logs and OTLP logs
      loki.write "default" {
        endpoint {
          url       = "http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push"
          tenant_id = "podinfo"
        }
      }

