---
apiVersion: microgateway.airlock.com/v1alpha1
kind: GatewayParameters
metadata:
  name: gatewayparameters
  namespace: airlock-gateway
spec:
  logging:
    level: info
  kubernetes:
    service:
      type: LoadBalancer
      externalTrafficPolicy: Local
    deployment:
      replicas: 1
      placement: {}
      engineContainer: {}
      automountServiceAccountToken: false
  defaults:
    contentSecurity:
      secured: {} # Enables WAAP processing in general with the default configuration of filter and mutation rules.
    sessionHandlingRef:
      name: sessionagent # This configures the session management via Redis of the gateway
    telemetryRef:
      name: gateway-telemetry # This configures the telemetry streaming of the gateway
